<header class="h-[50px] bg-white dark:bg-surface border-b border-light-border dark:border-white/10 shadow-sm flex-shrink-0">
  <div class="h-full max-w-full px-4 flex items-center justify-between gap-4">

    <!-- Gauche : bouton retour + titre -->
    <div class="flex items-center gap-3 min-w-0">
      <button (click)="goBack()"
        class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-light-surface dark:bg-surface border border-light-border dark:border-white/10 hover:border-light-primary dark:hover:border-primary text-light-text-muted dark:text-white/50 hover:text-light-primary dark:hover:text-primary transition-all text-xs font-medium flex-shrink-0">
        <span class="material-symbols-outlined text-sm">arrow_back</span>
        <span class="hidden sm:inline">{{ backLabel }}</span>
      </button>
      @if (title) {
        <span class="text-sm font-semibold text-light-text dark:text-white truncate">{{ title }}</span>
      }
    </div>

    <!-- Droite : thème + logout -->
    <div class="flex items-center gap-2 flex-shrink-0">
      <button (click)="toggleTheme()"
        title="Changer de thème"
        class="p-1.5 rounded-lg bg-light-surface dark:bg-surface border border-light-border dark:border-white/10 hover:border-light-primary dark:hover:border-primary transition-all">
        <span class="material-symbols-outlined text-light-primary dark:text-primary text-base">{{ themeIcon }}</span>
      </button>

      <button (click)="logout()"
        title="Déconnexion"
        class="flex items-center gap-1.5 px-2.5 py-1.5 rounded-lg bg-light-surface dark:bg-surface border border-light-border dark:border-white/10 hover:border-red-400/50 hover:text-red-400 text-light-text-muted dark:text-white/50 transition-all text-xs font-medium">
        <span class="material-symbols-outlined text-base">logout</span>
        <span class="hidden sm:inline">{{ currentUsername }}</span>
      </button>
    </div>

  </div>
</header>
