<header class="h-[30px] flex-shrink-0 bg-white dark:bg-surface border-b border-light-border dark:border-white/10 shadow-sm">
  <div class="h-full max-w-full px-4 flex items-center justify-between gap-3">

    <!-- Gauche : bouton retour + logo + nom portail -->
    <div class="flex items-center gap-2 min-w-0">
      <button (click)="goBack()"
        class="flex items-center gap-1 px-2 py-0.5 rounded bg-light-surface dark:bg-surface border border-light-border dark:border-white/10 hover:border-light-primary dark:hover:border-primary text-light-text-muted dark:text-white/50 hover:text-light-primary dark:hover:text-primary transition-all text-[11px] font-medium flex-shrink-0 group">
        <span class="material-symbols-outlined text-sm leading-none">arrow_back</span>
        <span class="font-bold uppercase tracking-wider text-[10px] whitespace-nowrap">
          <span class="group-hover:hidden">{{ backLabel }}</span>
          <span class="hidden group-hover:inline">Back</span>
        </span>
      </button>
      <div class="w-px h-4 bg-light-border dark:bg-white/10 flex-shrink-0"></div>
      <div class="w-5 h-5 neon-border flex items-center justify-center rounded flex-shrink-0">
        <span class="material-symbols-outlined neon-text text-[13px] leading-none">{{ appConfig.logoIcon() }}</span>
      </div>
      <span class="text-xs font-bold text-light-text dark:text-white truncate">{{ appConfig.appName() }}</span>
    </div>

    <!-- Droite : thème + logout -->
    <div class="flex items-center gap-1.5 flex-shrink-0">
      <button (click)="toggleTheme()"
        title="Changer de thème"
        class="p-1 rounded bg-light-surface dark:bg-surface border border-light-border dark:border-white/10 hover:border-light-primary dark:hover:border-primary transition-all">
        <span class="material-symbols-outlined text-light-primary dark:text-primary text-sm leading-none">{{ themeIcon }}</span>
      </button>

      <button (click)="logout()"
        title="Déconnexion"
        class="flex items-center gap-1 px-2 py-0.5 rounded bg-light-surface dark:bg-surface border border-light-border dark:border-white/10 hover:border-light-primary dark:hover:border-primary text-light-text-muted dark:text-white/50 hover:text-light-primary dark:hover:text-primary transition-all text-[11px] font-medium group overflow-hidden">
        <span class="material-symbols-outlined text-sm leading-none">logout</span>
        <span class="max-w-0 opacity-0 group-hover:max-w-[100px] group-hover:opacity-100 transition-all duration-300 ease-in-out whitespace-nowrap font-bold uppercase tracking-wider text-[10px]">
          Déconnexion
        </span>
      </button>
    </div>

  </div>
</header>
