@if (count() > 0) {
  <div class="update-banner"
       [class.update-banner--offline]="!isOnline()"
       role="status">
    <div class="update-banner__icon" aria-hidden="true">
      @if (!isOnline()) {
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 1l22 22"/><path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/><path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/><path d="M10.71 5.05A16 16 0 0 1 22.58 9"/><path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/>
        </svg>
      } @else {
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12a9 9 0 0 1-15 6.7L3 16"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><polyline points="21 3 21 8 16 8"/><polyline points="3 21 3 16 8 16"/>
        </svg>
      }
    </div>

    <div class="update-banner__body">
      <div class="update-banner__title">{{ summaryLabel() }}</div>
      @if (events().length > 1) {
        <ul class="update-banner__list">
          @for (e of events(); track e.nodeId) {
            <li>
              <span class="update-banner__author">{{ e.publishedBy.username }}</span>
              <span class="update-banner__section">{{ e.sectionName }}</span>
            </li>
          }
        </ul>
      }
      @if (pullError(); as err) {
        <div class="update-banner__error">⚠ {{ err }}</div>
      }
    </div>

    <div class="update-banner__actions">
      <button type="button"
              class="update-banner__btn update-banner__btn--primary"
              [disabled]="!isOnline() || pulling() || !projectName"
              (click)="onPull()">
        @if (pulling()) {
          <span>Mise à jour…</span>
        } @else if (!isOnline()) {
          <span>Hors ligne</span>
        } @else {
          <span>Mettre à jour</span>
        }
      </button>
      <button type="button"
              class="update-banner__btn update-banner__btn--icon"
              (click)="onDismiss()"
              aria-label="Ignorer">
        ×
      </button>
    </div>
  </div>
}
